apiVersion: apps/v1
kind: Deployment
metadata:
  name: pii-inference
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pii-inference
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
spec:
  replicas: {{ .Values.inference.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pii-inference
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pii-inference
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      terminationGracePeriodSeconds: 60   # allow in-flight inferences to complete
      containers:
        - name: inference
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.inference.image.repository }}:{{ .Values.inference.image.tag }}"
          imagePullPolicy: {{ .Values.inference.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            {{- range $key, $val := .Values.inference.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.inference.secretName }}
          livenessProbe:
            {{- toYaml .Values.inference.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.inference.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.inference.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
