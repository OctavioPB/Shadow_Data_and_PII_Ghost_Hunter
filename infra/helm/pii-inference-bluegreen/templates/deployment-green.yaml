apiVersion: apps/v1
kind: Deployment
metadata:
  name: pii-inference-green
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: pii-inference
    app.kubernetes.io/instance: {{ .Release.Name }}
    slot: green
spec:
  replicas: {{ .Values.green.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pii-inference
      slot: green
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pii-inference
        slot: green
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      terminationGracePeriodSeconds: 60
      containers:
        - name: inference
          image: "{{ .Values.imageRegistry }}/{{ .Values.green.image.repository }}:{{ .Values.green.image.tag }}"
          imagePullPolicy: {{ .Values.green.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.green.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
